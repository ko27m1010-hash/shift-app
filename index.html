<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>🌾 シフト管理システム</title>
    <style>
      :root { --gd: #1b4332; --gm: #2d6a4f; --gg: #40916c; --gl: #74c69d; --gp: #d8f3dc; --gb: #f0f7f4; --orange: #e67e22; --text: #1a1a1a; --sub: #666; --bd: #c8ddd4; --sh: 0 2px 10px rgba(0,0,0,0.09); }
      * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
      body { font-family: sans-serif; background: var(--gb); color: var(--text); padding-bottom: 88px; line-height: 1.6; }
      .hdr { background: linear-gradient(135deg, var(--gd), var(--gm)); color: #fff; padding: 16px; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; gap: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); cursor: pointer; }
      .hdr-logo { font-size: 1.6rem; }
      .hdr-title { font-size: 1rem; font-weight: 900; }
      .card { background: #fff; margin: 12px; border-radius: 12px; box-shadow: var(--sh); overflow: hidden; }
      .card-head { background: var(--gd); color: #fff; padding: 10px 15px; font-weight: 800; display: flex; align-items: center; gap: 8px; }
      .card-body { padding: 15px; }
      .btn-action { background: var(--gm); color: #fff; border: none; padding: 10px 16px; border-radius: 8px; font-weight: 700; cursor: pointer; }
      .btn-danger { background: #c0392b; }
      .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; z-index: 200; background: #fff; border-top: 1px solid var(--bd); display: grid; grid-template-columns: repeat(3, 1fr); padding-bottom: env(safe-area-inset-bottom); }
      .tab-bar.show-admin-tab { grid-template-columns: repeat(4, 1fr); }
      .tab-btn { display: flex; flex-direction: column; align-items: center; padding: 8px 0; border: none; background: none; color: var(--sub); font-size: 0.7rem; cursor: pointer; }
      .tab-btn.active { color: var(--gd); font-weight: 900; }
      .tab-panel { display: none; padding: 10px; }
      .tab-panel.active { display: block; }
      .overlay { display: none; position: fixed; inset: 0; z-index: 600; background: rgba(0,0,0,0.85); color: #fff; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
      .overlay.open { display: flex; }
      input, select, textarea { width: 100%; padding: 10px; border: 1px solid var(--bd); border-radius: 8px; font-size: 1rem; }
      @media print { .tab-bar, .hdr, .btn-action { display: none !important; } .sheet { break-after: page; border: 1px solid #000; padding: 20px; } }
    </style>
</head>
