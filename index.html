<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>🌾 シフト管理システム</title>
    <style>
      :root {
        --gd: #1b4332; --gm: #2d6a4f; --gg: #40916c; --gl: #74c69d; --gp: #d8f3dc; --gb: #f0f7f4;
        --gold: #d4a017; --red: #c0392b; --blue: #0077b6; --orange: #e67e22;
        --text: #1a1a1a; --sub: #666; --bd: #c8ddd4; --r: 13px; --sh: 0 2px 10px rgba(0,0,0,0.09);
        --fn: 'Noto Sans JP', sans-serif;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
      body { font-family: var(--fn); background: var(--gb); color: var(--text); padding-bottom: 88px; line-height: 1.6; }
      .hdr { background: linear-gradient(135deg, var(--gd), var(--gm)); color: #fff; padding: 16px; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; gap: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); cursor: pointer; }
      .hdr-logo { font-size: 1.6rem; }
      .hdr-title { font-size: 1rem; font-weight: 900; }
      .card { background: #fff; margin: 12px; border-radius: 12px; box-shadow: var(--sh); overflow: hidden; border: 1px solid var(--bd); }
      .card-head { background: var(--gd); color: #fff; padding: 10px 15px; font-weight: 800; display: flex; align-items: center; gap: 8px; }
      .card-body { padding: 15px; }
      
      /* 管理画面：横幅制限解除と横並びグリッド */
      .tab-panel { display: none; padding: 14px; max-width: 520px; margin: 0 auto; }
      .tab-panel.active { display: block; }
      #tab-mgr { max-width: none !important; width: 96% !important; }
      
      #admPrintTools, #admInvoiceArchive, #admStaffMgmt, #admBilling {
        display: grid !important;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)) !important;
        gap: 12px !important;
        align-items: stretch !important;
      }
      #admPrintTools > div, #admStaffMgmt > div, #admBilling > div:not([style*="GP"]) {
        margin: 0 !important; border: 1px solid var(--bd) !important; border-radius: 12px !important;
        padding: 15px !important; background: #fafcfb !important; height: 100% !important;
        display: flex !important; flex-direction: column !important; justify-content: space-between !important;
      }
      div[style*="font-weight:800;color:var(--gd)"] { grid-column: 1 / -1 !important; }

      .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; z-index: 200; background: #fff; border-top: 1px solid var(--bd); display: grid; grid-template-columns: repeat(3, 1fr); padding-bottom: env(safe-area-inset-bottom); }
      .tab-bar.show-admin-tab { grid-template-columns: repeat(4, 1fr); }
      .tab-btn { display: flex; flex-direction: column; align-items: center; padding: 8px 0; border: none; background: none; color: var(--sub); font-size: 0.75rem; cursor: pointer; }
      .tab-btn.active { color: var(--gd); font-weight: 900; background: var(--gp); }
      .overlay { display: none; position: fixed; inset: 0; z-index: 600; background: rgba(0,0,0,0.85); color: #fff; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
      .overlay.open { display: flex; }
      input, select, textarea { width: 100%; padding: 12px; border: 1px solid var(--bd); border-radius: 8px; font-size: 1rem; }
    </style>
</head>
<body>
    <div class="hdr" id="mainHeader" onclick="triggerAdminAccess()">
      <div class="hdr-logo">🌾</div>
      <div style="flex: 1">
        <div class="hdr-title">シフト管理システム</div>
        <div style="font-size:0.7rem;opacity:0.8">農業パートスタッフ用</div>
      </div>
    </div>

    <!-- タブ1：希望入力 -->
    <div class="tab-panel active" id="tab-input">
        <div class="card">
            <div class="card-head">👤 お名前</div>
            <div class="card-body">
                <select id="inpName" onchange="onNameChange()"><option value="">選択してください</option></select>
                <div id="selfLockInfo" style="font-size:0.85rem;color:var(--sub);margin-top:10px;line-height:1.7"></div>
            </div>
        </div>
        <div id="inputShiftPanel" style="display:none">
            <div class="card">
                <div class="card-head">📅 対象月</div>
                <div class="card-body"><select id="inpMonth" onchange="onMonthChange()"></select></div>
            </div>
            <div id="calSection" style="display:none" class="card">
                <div class="card-head">🗓️ 日付を選択</div>
                <div class="card-body">
                    <div id="icGrid" style="display:grid;grid-template-columns:repeat(7,1fr);gap:5px;"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- タブ2：実績入力 -->
    <div class="tab-panel" id="tab-actual">
        <div class="card">
            <div class="card-head">👤 お名前</div>
            <div class="card-body">
                <select id="actName" onchange="onActualNameChange()"><option value="">選択してください</option></select>
                <div id="actualSelfLockInfo" style="font-size:0.85rem;color:var(--sub);margin-top:10px;line-height:1.7"></div>
            </div>
        </div>
        <div class="card" id="actualWorkCard" style="display:none">
            <div class="card-head">⏱️ 勤務実績を保存</div>
            <div class="card-body">
                <input type="date" id="actDate" style="margin-bottom:12px">
                <div style="display:flex;gap:10px;margin-bottom:12px">
                    <input type="time" id="actStart" value="08:00"> 〜 <input type="time" id="actEnd" value="17:00">
                </div>
                <button class="btn-action" style="width:100%" onclick="submitActualWork()">実績を保存する</button>
            </div>
        </div>
    </div>

    <!-- タブ3：公開予定 -->
    <div class="tab-panel" id="tab-pub">
        <div class="card">
            <div class="card-head">📅 全体の予定</div>
            <div class="card-body" id="pubGrid"></div>
        </div>
    </div>

    <!-- タブ4：管理者（ここが横並びになります） -->
    <div class="tab-panel" id="tab-mgr">
        <div class="card"><div class="card-head">📊 月間集計</div><div class="card-body" id="admSummary"></div></div>
        <div class="card"><div class="card-head">💴 請求・精算管理</div><div class="card-body" id="admBilling"></div></div>
        <div class="card"><div class="card-head">🧾 清算書・請求控え</div><div class="card-body" id="admPrintTools"></div></div>
        <div class="card"><div class="card-head">📈 スタッフ勤務管理</div><div class="card-body" id="admStaffMgmt"></div></div>
    </div>

    <div class="tab-bar" id="mainTabBar">
        <button class="tab-btn active" onclick="switchTab('input')"><div>📝</div><div>希望</div></button>
        <button class="tab-btn" onclick="switchTab('actual')"><div>⏱️</div><div>実績</div></button>
        <button class="tab-btn" onclick="switchTab('pub')"><div>📅</div><div>予定</div></button>
        <button class="tab-btn" id="adminTabBtn" style="display:none" onclick="switchTab('mgr')"><div>🔐</div><div>管理</div></button>
    </div>

    <div class="overlay" id="pinOverlay">
        <div style="font-size:1.2rem;margin-bottom:20px">🔐 管理者認証</div>
        <input type="password" id="pinInput" placeholder="4桁PIN" maxlength="4" style="width:120px;text-align:center;font-size:1.5rem;">
        <div style="margin-top:20px;display:flex;gap:10px">
            <button class="btn-action" onclick="checkPin()">認証</button>
            <button class="btn-action" style="background:#666" onclick="closePin()">取消</button>
        </div>
    </div>
    <script>
      /* --- プログラム設定・データ保持 --- */
      const GAS_URL = "https://script.google.com/macros/s/AKfycbyol3aRw36McuyYjOfSK-NsRST8PqQHtiU7SUSh5CbYzSc9jyM658AoCBbGNBT5223CDg/exec";
      const LATEST_STAFF = ['江野', '金森', '佐々木', '立川夏子', '須藤', '武田信一', '中谷', '長谷部', '長谷部まさえ', '平間文美', '平間', '伏見', '真央', '吉園', '古関', '小山内', '野々村', '堤幸太'];
      const STAFF_SEED_VERSION = '2026-05-14-REMASTERED';

      let adminPin = localStorage.getItem('sf_pin') || '1234';
      let adminUnlocked = localStorage.getItem('sf_show_admin_tab') === '1';
      let staffList = JSON.parse(localStorage.getItem('sf_staff')) || [...LATEST_STAFF];
      let staffProfiles = JSON.parse(localStorage.getItem('sf_staff_profiles')) || [];
      let actualWorks = JSON.parse(localStorage.getItem('sf_actual_works')) || [];
      let viewYear = new Date().getFullYear(); let viewMonth = new Date().getMonth() + 1;
      let tapCount = 0; let tapTimer = null;

      document.addEventListener('DOMContentLoaded', async () => {
          // 強制名簿リフレッシュ（19名全員表示用）
          if (localStorage.getItem('sf_ver') !== STAFF_SEED_VERSION) {
              staffList = [...LATEST_STAFF];
              localStorage.setItem('sf_staff', JSON.stringify(staffList));
              localStorage.setItem('sf_ver', STAFF_SEED_VERSION);
          }
          updateStaffUI();
          if(adminUnlocked) showAdminUI();
          
          /* ヘッダー5回タップで認証 */
          document.getElementById('mainHeader').onclick = () => {
              tapCount++;
              if(tapCount >= 5) { tapCount=0; document.getElementById('pinOverlay').classList.add('open'); }
              setTimeout(() => tapCount=0, 2000);
          };
          renderViews();
      });

      function checkPin() {
          if(document.getElementById('pinInput').value === adminPin) {
              adminUnlocked = true; localStorage.setItem('sf_show_admin_tab', '1');
              document.getElementById('pinOverlay').classList.remove('open');
              showAdminUI(); switchTab('mgr');
          } else { alert('PINが違います'); }
      }
      function closePin() { document.getElementById('pinOverlay').classList.remove('open'); }
      function showAdminUI() {
          document.getElementById('mainTabBar').classList.add('show-admin-tab');
          document.getElementById('adminTabBtn').style.display = 'flex';
      }

      function switchTab(t) {
          if(t === 'mgr' && !adminUnlocked) { document.getElementById('pinOverlay').classList.add('open'); return; }
          document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
          document.getElementById('tab-' + t)?.classList.add('active');
          document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
          if(t === 'mgr') renderViews();
      }

      /* --- 管理画面の描画（横並びカード強制適用） --- */
      function renderViews() {
          const mgmt = document.getElementById('admStaffMgmt');
          const billing = document.getElementById('admBilling');
          const printArea = document.getElementById('admPrintTools');
          if(!mgmt) return;

          // 勤務管理（横並び）
          mgmt.innerHTML = staffList.map(name => {
              const works = actualWorks.filter(w => w.name === name);
              const mWorks = works.filter(w => w.date && w.date.includes(`${viewYear}-${String(viewMonth).padStart(2,'0')}`));
              return `<div style="border:1px solid var(--bd); border-radius:12px; padding:15px; background:#fafcfb;">
                  <div style="font-weight:900; color:var(--gd); border-bottom:1px solid #eee; padding-bottom:5px; margin-bottom:10px">👤 ${name}</div>
                  <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
                    <div style="background:#fff; padding:5px; border-radius:5px; text-align:center; border:1px solid #eee;">
                      <div style="font-size:0.6rem; color:#666">今月</div><b>${mWorks.length}日</b>
                    </div>
                    <div style="background:#fff; padding:5px; border-radius:5px; text-align:center; border:1px solid #eee;">
                      <div style="font-size:0.6rem; color:#666">年間</div><b>${works.length}日</b>
                    </div>
                  </div>
              </div>`;
          }).join('');

          // 精算・実績（横並び）
          const billingContent = staffList.map(name => {
              const mWorks = actualWorks.filter(w => w.name === name && w.date && w.date.includes(`${viewYear}-${String(viewMonth).padStart(2,'0')}`));
              if(mWorks.length === 0) return '';
              return `<div style="border:1px solid var(--bd); border-radius:12px; padding:15px; background:#fff;">
                  <div style="font-weight:900; color:var(--gd)">${name} 様</div>
                  <div style="font-size:0.8rem; color:#666; margin:8px 0">今月実績: ${mWorks.length}日</div>
                  <button class="btn-action" style="width:100%; font-size:0.8rem;" onclick="alert('印刷準備')">🖨️ 印刷</button>
              </div>`;
          }).join('');
          billing.innerHTML = billingContent || "<div style='grid-column:1/-1; text-align:center; color:#999'>実績データなし</div>";
      }

      function updateStaffUI() {
          const list = staffList.map(n => `<option value="${n}">${n}</option>`).join('');
          document.getElementById('inpName').innerHTML = '<option value="">選択してください</option>' + list;
          document.getElementById('actName').innerHTML = '<option value="">選択してください</option>' + list;
      }
      
      // 保存
      function saveDB() {
          localStorage.setItem('sf_staff', JSON.stringify(staffList));
          localStorage.setItem('sf_actual_works', JSON.stringify(actualWorks));
      }
    </script>
</body>
</html>
